logging:
  level:
    com.worldcup.forum.mapper: debug

# Actuator：生产环境请限制 /actuator 暴露范围或加网关鉴权
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name:worldcup-forum}
