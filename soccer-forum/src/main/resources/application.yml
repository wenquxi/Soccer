server:
  port: 8080

spring:
  application:
    name: worldcup-forum
  datasource:
    url: jdbc:mysql://localhost:3306/worldcup_forum?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: soccer
    password: 162538
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.worldcup.forum.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

